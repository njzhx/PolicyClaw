name: 政策爬虫定时执行

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: Set timezone to Beijing (UTC+8)
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 彻底禁用 Snap 并安装 Google Chrome
        run: |
          # 1. 等待并强制释放 apt 锁，防止后台自动更新占用
          sudo fuser -kk /var/lib/dpkg/lock-frontend || true
          sudo fuser -kk /var/lib/apt/lists/lock || true
          sudo dpkg --configure -a
          
          # 2. 阻止 apt 尝试安装 snap 版 chromium
          sudo printf "Package: chromium-browser\nPin: release *\nPin-Priority: -1\n" | sudo tee /etc/apt/preferences.d/nosnap.pref
          
          # 3. 安装依赖和 Google Chrome
          sudo apt-get update
          sudo apt-get install -y wget fonts-liberation libnss3 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2
          
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          
          # 4. 建立软链接兼容性
          sudo ln -s /usr/bin/google-chrome /usr/bin/chromium-browser || true
          
          google-chrome --version

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 执行爬虫
        run: python crawler_manager.py
        env:
          SUPABASE_PROJECT_API: ${{ secrets.SUPABASE_PROJECT_API }}
          SUPABASE_ANON_PUBLIC: ${{ secrets.SUPABASE_ANON_PUBLIC }}
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
      
      - name: 输出执行结果
        if: always()
        run: echo "爬虫执行完成，请查看上方日志"
